<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook Groups Dhaka University Tuition</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
background:linear-gradient(135deg,#eef2ff,#f8fafc);
padding:20px
}

.header{text-align:center;margin-bottom:30px}
.header h1{font-size:28px;font-weight:600}
.header p{color:#666;font-size:14px;margin-top:5px}

.container{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:#fff;
border-radius:18px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
transition:0.3s;
position:relative;
overflow:hidden;
}

.card::before{
content:"";
position:absolute;
top:0;left:0;width:100%;height:5px;
background:linear-gradient(90deg,#1877f2,#42a5f5);
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 20px 40px rgba(0,0,0,0.12);
}

.top-row{
 display:flex;
 align-items:center;
 gap:10px;
 margin-bottom:10px;
}

.logo{
 width:40px;
 height:40px;
 border-radius:50%;
 overflow:hidden;
 display:flex;
 align-items:center;
 justify-content:center;
 background:#1877f2;
 color:#fff;
 font-weight:600;
 font-size:14px;
}

.logo img{
 width:100%;
 height:100%;
 object-fit:cover;
}

.serial{
 font-size:14px;
 color:#999;
}

.group-name{
font-size:16px;
font-weight:600;
margin-bottom:5px
}

.members{
font-size:13px;
color:#777;
margin-bottom:15px
}

.join-btn{
display:block;
text-align:center;
text-decoration:none;
background:linear-gradient(90deg,#1877f2,#42a5f5);
color:#fff;
padding:10px;
border-radius:10px;
font-size:14px;
transition:0.3s;
}

.join-btn:hover{opacity:0.9}

.footer{
text-align:center;
margin-top:40px;
color:#888;
font-size:13px
}

.footer a{
color:#1877f2;
text-decoration:none;
font-weight:500
}

@media(max-width:500px){
.header h1{font-size:22px}
}
</style>
</head>

<body>

<div class="header">
<h1>🔥 Facebook Groups Dhaka University Tuition</h1>
<p>Join top communities & grow your network</p>
</div>

<div class="container" id="groupContainer"></div>

<div class="footer">
© <span id="year"></span> Tuition Media | Developed by 
<a href="https://arodx.com" target="_blank">arodx.com</a>
</div>

<script>
const groups = [
{name:"dhaka university tuition",members:"39.8K members",link:"https://www.facebook.com/groups/1219541089651789/?__tn__=%2Cd"},
{name:"Dhaka University Tuition Media",members:"39.8K members",link:"https://www.facebook.com/groups/2698422477035447/?__tn__=%2Cd"},
{name:"Dhaka University Tuition Club",members:"39.8K members",link:"https://www.facebook.com/groups/1395299374125023/?__tn__=%2Cd"},
{name:"Dhaka University Tuition 💥",members:"39.8K members",link:"https://www.facebook.com/groups/942714247742621/?__tn__=%2Cd"},
{name:"Dhaka University Tuition Club= ঢাকা বিশ্ববিদ্যালয় টিউশন ক্লাব🔥",members:"39.8K members",link:"https://www.facebook.com/groups/1311993533336135/?__tn__=%2Cd"},
{name:"Tution For DU/BUET/DMC",members:"39.8K members",link:"https://www.facebook.com/groups/3656763737982798/?__tn__=%2Cd"},
{name:"DHAKA UNIVERSITY TUITION MEDIA",members:"39.8K members",link:"https://www.facebook.com/groups/331347145604738/?__tn__=%2Cd"},
{name:"Dhaka University Tuition Media",members:"39.8K members",link:"https://www.facebook.com/groups/895502074653435/?__tn__=%2Cd"},
{name:"Tution media ( Students of Dhaka University)",members:"39.8K members",link:"https://www.facebook.com/groups/317726152058297/?__tn__=%2Cd"},
{name:"📕Azimpur, Katabon, Elephant Rd, Hatirpool, DU Campus Tuition-ঢাবি টিউশন✍️",members:"39.8K members",link:"https://www.facebook.com/groups/1077663339968071/?__tn__=%2Cd"},
{name:"Dhaka University Tuition",members:"1.0K members",link:"https://www.facebook.com/groups/581856825003307/?__tn__=%2Cd"},
{name:"Dhaka University Tuition Media",members:"23.4K members",link:"https://www.facebook.com/groups/764717818430785/?__tn__=%2Cd"},
];

const container = document.getElementById('groupContainer');

groups.forEach((group,index)=>{

const card = document.createElement('div');
card.className='card';

const logoContent = group.logo
  ? `<img src="${group.logo}" alt="logo">`
  : `<span>${index+1}</span>`;

card.innerHTML=`
<div class="top-row">
  <div class="logo">${logoContent}</div>
  <div class="serial">#${index+1}</div>
</div>
<div class="group-name">${group.name}</div>
<div class="members">${group.members}</div>
<a href="${group.link}" target="_blank" rel="noopener noreferrer" class="join-btn">Join Group</a>
`;

container.appendChild(card);
});

// Auto year
document.getElementById('year').textContent = new Date().getFullYear();
</script>

</body>
</html>
